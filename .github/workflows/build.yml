name: Build SchnellVPN APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 26
        run: sdkmanager --install "ndk;26.3.11579264"

      - name: Clone hev-socks5-tunnel (tun2socks bridge)
        run: |
          git clone --recursive https://github.com/heiher/hev-socks5-tunnel \
            app/src/main/jni/hev-socks5-tunnel

      - name: Download libv2ray.aar
        run: |
          mkdir -p app/libs
          curl -fL -o app/libs/libv2ray.aar \
            https://github.com/2dust/AndroidLibXrayLite/releases/latest/download/libv2ray.aar
          ls -lh app/libs/libv2ray.aar

      - name: Build debug APK
        run: gradle assembleDebug 2>&1 | grep -E "error:|e:|Unresolved|Cannot|not found" | head -30 || gradle assembleDebug
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SchnellVPN-debug-apk
          path: app/build/outputs/apk/debug/*.apk
